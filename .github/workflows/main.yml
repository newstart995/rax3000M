name: Build ImmortalWrt RAX3000M

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 清理磁盘空间并安装环境
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update
          sudo apt install -y build-essential flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget
          
      - name: 下载源码与 Feeds
        run: |
          git clone https://github.com/immortalwrt/immortalwrt -b master openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载自定义配置
        run: |
          [ -e .config ] && mv .config openwrt/.config
          cd openwrt && make defconfig

      - name: 下载软件包
        run: cd openwrt && make download -j8

      - name: 核心编译
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 整理并上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_RAX3000M_Firmware
          path: openwrt/bin/targets/mediatek/filogic/*.bin
